version: '3.8'

services:
  postgres:
    image: postgres:13.5
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - postgres-network

  test-postgres:
    image: postgres:13.5
    restart: no
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nest
    volumes:
      - test-postgres:/var/lib/postgresql/test-data
    ports:
      - '5435:5435'
    networks:
      - postgres-network

  redis:
    image: redis:7.0.5
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - redis:/data
    networks:
      - redis-network

volumes:
  postgres:
  test-postgres:
  redis:

networks:
  postgres-network:
  redis-network:
